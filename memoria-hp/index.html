<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memoria Mágica ⚡</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1040;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 40px;
    }

    h1 {
      color: #e8d5a3;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #9b8ec4;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: #2a1f5e;
      border: 1px solid #3d2f7a;
      border-radius: 10px;
      padding: 10px 20px;
      text-align: center;
      min-width: 80px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: #e8d5a3;
    }

    .stat-label {
      font-size: 11px;
      color: #9b8ec4;
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 360px;
      width: 100%;
      margin-bottom: 20px;
    }

    .card {
      aspect-ratio: 1;
      cursor: pointer;
      perspective: 600px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
      border-radius: 10px;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: #3C3489;
      border: 2px solid #534AB7;
      font-size: 24px;
    }

    .card-front {
      background: #f5f0ff;
      border: 2px solid #9b8ec4;
      font-size: 32px;
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: #d4edda;
      border-color: #5a9e6f;
    }

    .card.blocked {
      pointer-events: none;
    }

    .btn-restart {
      background: #3C3489;
      color: #e8d5a3;
      border: 1px solid #534AB7;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-restart:hover {
      background: #534AB7;
    }

    /* Pantalla de victoria */
    .win-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      animation: fadeIn 0.5s ease;
    }

    .win-screen.visible {
      display: flex;
    }

    .win-title {
      font-size: 28px;
      color: #e8d5a3;
      font-weight: 600;
    }

    .win-msg {
      color: #9b8ec4;
      font-size: 14px;
      text-align: center;
    }

    /* Hechizo desbloqueado */
    .spell-unlock {
      background: #2a1f5e;
      border: 1px solid #e8d5a3;
      border-radius: 12px;
      padding: 14px 20px;
      text-align: center;
      max-width: 300px;
      animation: aparecer 0.6s ease;
    }

    .spell-unlock-label {
      font-size: 11px;
      color: #9b8ec4;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .spell-name {
      font-size: 20px;
      color: #e8d5a3;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .spell-desc {
      font-size: 13px;
      color: #b8a9d9;
      line-height: 1.5;
    }

    /* Grimorio — colección de hechizos */
    .grimorio {
      margin-top: 28px;
      width: 100%;
      max-width: 360px;
    }

    .grimorio-title {
      color: #e8d5a3;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .grimorio-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .spell-card {
      background: #2a1f5e;
      border: 1px solid #3d2f7a;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: aparecer 0.4s ease;
    }

    .spell-card-emoji {
      font-size: 22px;
      flex-shrink: 0;
    }

    .spell-card-info {
      flex: 1;
    }

    .spell-card-name {
      font-size: 14px;
      color: #e8d5a3;
      font-weight: 600;
    }

    .spell-card-desc {
      font-size: 12px;
      color: #9b8ec4;
      margin-top: 2px;
      line-height: 1.4;
    }

    .grimorio-empty {
      color: #534AB7;
      font-size: 13px;
      text-align: center;
      padding: 16px;
      border: 1px dashed #3d2f7a;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes aparecer {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Botón de música */
    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #2a1f5e;
      border: 1px solid #534AB7;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: background 0.2s;
    }

    .music-btn:hover { background: #3C3489; }
  </style>
</head>
<body>

  <h1>⚡ Memoria Mágica</h1>
  <p class="subtitle">Encuentra todas las parejas</p>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="intentos">0</div>
      <div class="stat-label">Intentos</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="parejas">0</div>
      <div class="stat-label">Parejas</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="tiempo">0:00</div>
      <div class="stat-label">Tiempo</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <button class="btn-restart" id="btn-restart">Nuevo juego</button>

  <div class="win-screen" id="win-screen">
    <div class="win-title">🎉 ¡Expecto Patronum!</div>
    <div class="win-msg" id="win-msg"></div>
    <div class="spell-unlock" id="spell-unlock">
      <div class="spell-unlock-label">✨ Hechizo desbloqueado</div>
      <div class="spell-name" id="spell-name"></div>
      <div class="spell-desc" id="spell-desc"></div>
    </div>
  </div>

  <!-- Botón música -->
  <button class="music-btn" id="music-btn" title="Música">🔇</button>

  <!-- Grimorio: colección de hechizos conseguidos -->
  <div class="grimorio" id="grimorio">
    <div class="grimorio-title">📖 Tu Grimorio</div>
    <div class="grimorio-grid" id="grimorio-grid"></div>
  </div>

<script>
  const EMOJIS = ['🧙', '🦉', '🪄', '🎩', '🧹', '🫧', '📖', '⚡'];

  // Lista de hechizos disponibles para desbloquear
  const HECHIZOS = [
    { emoji: '✨', nombre: 'Lumos',          desc: 'Ilumina la punta de tu varita en la oscuridad.' },
    { emoji: '🌀', nombre: 'Wingardium Leviosa', desc: 'Hace levitar objetos con un simple movimiento.' },
    { emoji: '🛡️', nombre: 'Protego',        desc: 'Crea un escudo mágico que bloquea hechizos.' },
    { emoji: '🔥', nombre: 'Incendio',        desc: 'Lanza una llama directamente desde tu varita.' },
    { emoji: '❄️', nombre: 'Glacius',         desc: 'Congela al objetivo con un chorro de hielo.' },
    { emoji: '💨', nombre: 'Ventus',          desc: 'Genera una ráfaga de viento poderosa.' },
    { emoji: '🌿', nombre: 'Herbivicus',      desc: 'Hace crecer plantas a una velocidad increíble.' },
    { emoji: '⚡', nombre: 'Expelliarmus',    desc: 'El hechizo desarmador favorito de Harry Potter.' },
    { emoji: '🌟', nombre: 'Expecto Patronum',desc: 'Invoca un Patronus para ahuyentar a los Dementores.' },
    { emoji: '🔮', nombre: 'Revelio',         desc: 'Revela objetos, personas o secretos ocultos.' },
    { emoji: '🦋', nombre: 'Alohomora',       desc: 'Abre cualquier cerradura con un toque de varita.' },
    { emoji: '🌙', nombre: 'Nox',             desc: 'Apaga la luz de tu varita encendida con Lumos.' },
    { emoji: '💫', nombre: 'Accio',           desc: 'Llama cualquier objeto hacia tus manos al instante.' },
    { emoji: '🎭', nombre: 'Riddikulus',      desc: 'Transforma a un Boggart en algo gracioso e inofensivo.' },
    { emoji: '🕊️', nombre: 'Reparo',          desc: 'Repara objetos rotos como si nunca se hubieran roto.' },
  ];

  // Estado del juego
  let cartas = [];
  let voltedas = [];
  let parejas = 0;
  let intentos = 0;
  let bloqueado = false;
  let segundos = 0;
  let intervalo = null;

  // Hechizos guardados en localStorage (persisten entre sesiones)
  let hechizosDesbloqueados = JSON.parse(localStorage.getItem('hechizos') || '[]');

  // Referencias al DOM
  const grid          = document.getElementById('grid');
  const elIntentos    = document.getElementById('intentos');
  const elParejas     = document.getElementById('parejas');
  const elTiempo      = document.getElementById('tiempo');
  const winScreen     = document.getElementById('win-screen');
  const winMsg        = document.getElementById('win-msg');
  const btnRestart    = document.getElementById('btn-restart');
  const spellUnlock   = document.getElementById('spell-unlock');
  const elSpellName   = document.getElementById('spell-name');
  const elSpellDesc   = document.getElementById('spell-desc');
  const grimorioGrid  = document.getElementById('grimorio-grid');

  function mezclar(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function formatTiempo(s) {
    const m = Math.floor(s / 60);
    const ss = String(s % 60).padStart(2, '0');
    return `${m}:${ss}`;
  }

  // Devuelve un hechizo que todavía no fue desbloqueado, o null si ya los tenés todos
  function hechizoPendiente() {
    const nombres = hechizosDesbloqueados.map(h => h.nombre);
    const pendientes = HECHIZOS.filter(h => !nombres.includes(h.nombre));
    if (pendientes.length === 0) return null;
    return pendientes[Math.floor(Math.random() * pendientes.length)];
  }

  // Renderiza el grimorio completo
  function renderGrimorio() {
    if (hechizosDesbloqueados.length === 0) {
      grimorioGrid.innerHTML = '<div class="grimorio-empty">Ganá una partida para desbloquear tu primer hechizo.</div>';
      return;
    }
    grimorioGrid.innerHTML = '';
    hechizosDesbloqueados.forEach(h => {
      const el = document.createElement('div');
      el.className = 'spell-card';
      el.innerHTML = `
        <div class="spell-card-emoji">${h.emoji}</div>
        <div class="spell-card-info">
          <div class="spell-card-name">${h.nombre}</div>
          <div class="spell-card-desc">${h.desc}</div>
        </div>`;
      grimorioGrid.appendChild(el);
    });
  }

  function iniciar() {
    voltedas = [];
    parejas = 0;
    intentos = 0;
    bloqueado = false;
    segundos = 0;
    clearInterval(intervalo);

    elIntentos.textContent = '0';
    elParejas.textContent = '0';
    elTiempo.textContent = '0:00';
    winScreen.classList.remove('visible');
    spellUnlock.style.display = 'none';
    grid.innerHTML = '';

    cartas = mezclar([...EMOJIS, ...EMOJIS]);

    cartas.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.dataset.index = i;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-back">⚡</div>
          <div class="card-front">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => voltear(card));
      grid.appendChild(card);
    });

    intervalo = setInterval(() => {
      segundos++;
      elTiempo.textContent = formatTiempo(segundos);
    }, 1000);
  }

  function voltear(card) {
    if (bloqueado) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    card.classList.add('flipped');
    voltedas.push(card);

    if (voltedas.length === 2) {
      intentos++;
      elIntentos.textContent = intentos;
      comparar();
    }
  }

  function comparar() {
    const [a, b] = voltedas;
    const sonPareja = a.dataset.emoji === b.dataset.emoji;

    if (sonPareja) {
      a.classList.add('matched', 'blocked');
      b.classList.add('matched', 'blocked');
      voltedas = [];
      parejas++;
      elParejas.textContent = parejas;

      if (parejas === EMOJIS.length) {
        ganar();
      }
    } else {
      bloqueado = true;
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        voltedas = [];
        bloqueado = false;
      }, 1000);
    }
  }

  function ganar() {
    clearInterval(intervalo);
    winMsg.textContent = `Lo lograste en ${intentos} intentos y ${formatTiempo(segundos)}. ¡Eres un mago!`;
    winScreen.classList.add('visible');

    // Desbloquear un hechizo nuevo
    const nuevo = hechizoPendiente();
    if (nuevo) {
      hechizosDesbloqueados.push(nuevo);
      localStorage.setItem('hechizos', JSON.stringify(hechizosDesbloqueados));
      elSpellName.textContent = `${nuevo.emoji} ${nuevo.nombre}`;
      elSpellDesc.textContent = nuevo.desc;
      spellUnlock.style.display = 'block';
    } else {
      // Ya los desbloqueó todos
      spellUnlock.style.display = 'block';
      elSpellName.textContent = '🏆 ¡Maestro Mago!';
      elSpellDesc.textContent = 'Ya desbloqueaste todos los hechizos del grimorio.';
    }

    renderGrimorio();
  }

  btnRestart.addEventListener('click', iniciar);

  // ── Música generada con Web Audio API ───────────────────────────────
  let audioCtx = null;
  let musicaActiva = false;
  let nodos = [];
  const musicBtn = document.getElementById('music-btn');

  // Melodía mágica: frecuencias en Hz (escala de Mi menor, estilo Hedwig)
  const MELODIA = [
    659, 0, 784, 0, 1047, 988, 784, 0,
    1047, 0, 988, 0, 784, 1047, 988, 0,
    880, 0, 698, 0, 932, 880, 698, 0,
    698, 0, 659, 0, 784, 0, 659, 0,
  ];

  function crearAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function tocarNota(frecuencia, inicio, duracion, volumen) {
    if (!frecuencia) return;
    const osc    = audioCtx.createOscillator();
    const gain   = audioCtx.createGain();
    const reverb = audioCtx.createConvolver();

    osc.type = 'triangle';
    osc.frequency.value = frecuencia;

    gain.gain.setValueAtTime(0, inicio);
    gain.gain.linearRampToValueAtTime(volumen, inicio + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, inicio + duracion);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(inicio);
    osc.stop(inicio + duracion + 0.1);
    nodos.push(osc);
  }

  function reproducirMelodia() {
    if (!musicaActiva) return;
    const bpm = 160;
    const duracionNota = 60 / bpm;
    const ahora = audioCtx.currentTime;

    MELODIA.forEach((freq, i) => {
      tocarNota(freq, ahora + i * duracionNota, duracionNota * 0.8, 0.15);
    });

    const totalDuracion = MELODIA.length * duracionNota * 1000;
    setTimeout(() => { if (musicaActiva) reproducirMelodia(); }, totalDuracion);
  }

  function toggleMusica() {
    crearAudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    musicaActiva = !musicaActiva;
    musicBtn.textContent = musicaActiva ? '🔊' : '🔇';

    if (musicaActiva) {
      reproducirMelodia();
    } else {
      nodos.forEach(n => { try { n.stop(); } catch(e) {} });
      nodos = [];
    }
  }

  musicBtn.addEventListener('click', toggleMusica);

  // Mostrar grimorio al cargar
  renderGrimorio();
  iniciar();
</script>
</body>
</html>
