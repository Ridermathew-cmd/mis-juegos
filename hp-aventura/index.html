<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Harry Potter: La Aventura de Hogwarts</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#f0c040; --dark:#0a0510; --text:#f0e8d0; --hp:#e74c3c; --mp:#3498db; }
body { background:var(--dark); color:var(--text); font-family:'Georgia',serif; height:100vh; overflow:hidden; }

.screen { display:none; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }

#canvas3d { position:fixed; inset:0; width:100%; height:100%; z-index:0; }

#hud {
  display:none; pointer-events:none; z-index:10; position:fixed; top:0; left:0; right:0;
  padding:12px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);
}
#hud.visible { display:flex; justify-content:space-between; align-items:center; }
.hud-left { display:flex; flex-direction:column; gap:4px; }
.hud-name { font-size:0.9em; color:var(--gold); text-shadow:0 0 8px rgba(240,192,64,0.6); }
.hud-level { font-size:0.7em; color:#aaa; }
.bars { display:flex; flex-direction:column; gap:4px; }
.bar-row { display:flex; align-items:center; gap:6px; font-size:0.7em; }
.bar-track { width:90px; height:7px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.4s; }
.bar-hp { background:linear-gradient(90deg,#c0392b,#e74c3c); }
.bar-mp { background:linear-gradient(90deg,#2980b9,#3498db); }
.hud-map-btn { background:none; border:none; font-size:1.5em; cursor:pointer; pointer-events:all; }

#bottom-panel {
  position:fixed; bottom:0; left:0; right:0; z-index:20; pointer-events:all;
  background:linear-gradient(0deg,rgba(5,2,15,0.97),rgba(5,2,15,0.88));
  border-top:1px solid rgba(240,192,64,0.25); padding:12px 14px;
  transform:translateY(100%); transition:transform 0.3s ease;
}
#bottom-panel.open { transform:translateY(0); }
.panel-speaker { color:var(--gold); font-size:0.82em; font-weight:bold; margin-bottom:5px; }
.panel-text { color:var(--text); font-size:0.88em; line-height:1.55; min-height:44px; }
.panel-choices { display:flex; flex-direction:column; gap:7px; margin-top:10px; }
.choice-btn {
  padding:10px 14px; border-radius:9px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
  color:var(--text); cursor:pointer; font-family:Georgia,serif; font-size:0.86em; text-align:left; transition:all 0.18s;
}
.choice-btn:active { background:rgba(240,192,64,0.18); border-color:var(--gold); }

#combat-panel {
  position:fixed; bottom:0; left:0; right:0; z-index:20; pointer-events:all;
  transform:translateY(100%); transition:transform 0.3s ease;
}
#combat-panel.open { transform:translateY(0); }
.combat-top {
  background:rgba(5,2,15,0.94); border-top:1px solid rgba(240,192,64,0.2); padding:10px 14px;
}
.enemy-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.enemy-bar-name { font-size:0.75em; color:#faa; min-width:130px; }
.enemy-track { flex:1; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.enemy-bar-fill { height:100%; background:linear-gradient(90deg,#8b0000,#e74c3c); border-radius:4px; transition:width 0.4s; }
.combat-log {
  background:rgba(0,0,0,0.4); margin:6px 0; border-radius:8px; padding:7px 10px;
  font-size:0.78em; max-height:52px; overflow-y:auto; line-height:1.5;
}
.log-magic{color:#aaf;} .log-dmg{color:#f88;} .log-heal{color:#8f8;} .log-win{color:var(--gold);font-weight:bold;}
.spells-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:7px; padding:8px 14px 14px;
  background:rgba(5,2,15,0.97);
}
.spell-btn {
  padding:9px 8px; border-radius:9px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1); color:var(--text); cursor:pointer;
  font-family:Georgia,serif; display:flex; flex-direction:column; align-items:center; gap:2px; transition:all 0.18s;
}
.spell-btn:active:not(:disabled) { background:rgba(100,100,255,0.2); border-color:#88f; }
.spell-btn:disabled { opacity:0.35; }
.spell-icon { font-size:1.5em; }
.spell-name { font-size:0.78em; color:var(--gold); font-style:italic; }
.spell-stats { font-size:0.65em; color:#aaa; }

#map-panel {
  position:fixed; bottom:0; left:0; right:0; z-index:20; pointer-events:all;
  background:linear-gradient(0deg,rgba(5,2,15,0.97),rgba(5,2,15,0.88));
  border-top:1px solid rgba(240,192,64,0.2); padding:14px;
  transform:translateY(100%); transition:transform 0.3s ease;
}
#map-panel.open { transform:translateY(0); }
.map-title { color:var(--gold); font-size:0.9em; margin-bottom:10px; text-align:center; }
.zones-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.zone-card {
  padding:12px 10px; border-radius:11px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1); cursor:pointer; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:4px; transition:all 0.18s;
}
.zone-card.available { border-color:rgba(240,192,64,0.4); }
.zone-card.locked { opacity:0.4; cursor:default; }
.zone-card.completed { border-color:#27ae60; }
.zone-card:active.available { background:rgba(240,192,64,0.12); }
.zone-icon-big { font-size:2em; }
.zone-name { font-size:0.78em; color:var(--gold); }
.zone-status { font-size:0.65em; color:#888; }

#screen-intro { background:radial-gradient(ellipse at 50% 30%,#2a1040 0%,#050010 100%); z-index:100; }
.intro-content { text-align:center; z-index:2; position:relative; padding:20px; }
.intro-title { font-size:2.4em; color:var(--gold); text-shadow:0 0 30px rgba(240,192,64,0.7),0 0 60px rgba(240,192,64,0.3); letter-spacing:3px; line-height:1.15; }
.intro-sub { color:#ccbbdd; font-size:0.9em; margin:8px 0 28px; font-style:italic; }
#stars-bg { position:absolute; inset:0; pointer-events:none; }
.star { position:absolute; background:white; border-radius:50%; animation:twinkle 2s infinite alternate; }
@keyframes twinkle { from{opacity:0.15} to{opacity:1} }

#screen-create { background:radial-gradient(ellipse at 50% 0%,#1a0828 0%,#050010 100%); z-index:100; padding:20px; }
.create-box { background:rgba(255,255,255,0.04); border:1px solid rgba(240,192,64,0.25); border-radius:16px; padding:22px; width:100%; max-width:370px; }
.create-box h2 { color:var(--gold); text-align:center; margin-bottom:18px; font-size:1.3em; }
.field { margin-bottom:14px; }
.field label { display:block; color:#ccb; font-size:0.82em; margin-bottom:5px; }
.field input { width:100%; padding:10px 13px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.18); border-radius:8px; color:var(--text); font-family:Georgia,serif; font-size:0.95em; outline:none; }
.field input:focus { border-color:var(--gold); }
.houses-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.house-btn { padding:11px 6px; border-radius:10px; border:2px solid transparent; cursor:pointer; font-family:Georgia,serif; font-size:0.8em; text-align:center; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all 0.2s; }
.house-btn[data-house=gryffindor]{background:rgba(139,0,0,0.25);color:#ffaaaa;}
.house-btn[data-house=slytherin] {background:rgba(20,80,20,0.25); color:#aaffaa;}
.house-btn[data-house=ravenclaw] {background:rgba(10,40,100,0.25);color:#aaccff;}
.house-btn[data-house=hufflepuff]{background:rgba(100,80,0,0.25); color:#ffeeaa;}
.house-btn.selected { border-color:var(--gold); transform:scale(1.04); }
.house-icon { font-size:1.8em; }

#screen-reward { background:radial-gradient(ellipse at 50%,#1a1000,#020008); z-index:100; }
.reward-card { background:rgba(240,192,64,0.07); border:1px solid rgba(240,192,64,0.35); border-radius:16px; padding:26px 20px; width:100%; max-width:310px; text-align:center; }
.reward-title { color:var(--gold); font-size:1.35em; margin-bottom:12px; }
.reward-icon-big { font-size:3.5em; margin-bottom:10px; }
.reward-items { display:flex; flex-direction:column; gap:7px; margin:14px 0; }
.reward-item { display:flex; align-items:center; gap:9px; padding:7px 11px; border-radius:8px; background:rgba(255,255,255,0.04); font-size:0.88em; }
.reward-val { color:var(--gold); margin-left:auto; }

.btn-gold {
  background:linear-gradient(135deg,#7a5a10,#c8a82a,#7a5a10);
  border:none; color:#1a0800; padding:13px 28px; border-radius:10px;
  font-family:Georgia,serif; font-size:0.95em; font-weight:bold; cursor:pointer;
  box-shadow:0 4px 16px rgba(200,168,42,0.35); transition:all 0.2s; width:100%;
}
.btn-gold:active { transform:scale(0.97); }
.btn-sec { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.18); color:var(--text); padding:11px 22px; border-radius:10px; font-family:Georgia,serif; font-size:0.88em; cursor:pointer; width:100%; transition:all 0.2s; }

.toast { position:fixed; bottom:200px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.92); border:1px solid var(--gold); color:var(--text); padding:9px 18px; border-radius:18px; font-size:0.82em; z-index:999; pointer-events:none; animation:toastAnim 2.5s forwards; }
@keyframes toastAnim { 0%{opacity:0;transform:translateX(-50%) translateY(8px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0} }

#turn-ind { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); border:1px solid rgba(240,192,64,0.4); color:var(--gold); font-size:0.78em; padding:5px 14px; border-radius:12px; z-index:30; display:none; }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div id="hud">
  <div class="hud-left">
    <span class="hud-name" id="hud-name">Mago</span>
    <span class="hud-level" id="hud-level">Nv.1</span>
  </div>
  <div class="bars">
    <div class="bar-row">
      <span style="color:#f88">HP</span>

<div id="combat-panel">
  <div class="combat-top">

      <div class="enemy-track"><div class="enemy-bar-fill" id="enemy-hp-fill" style="width:100%"></div></div>
      <span id="enemy-hp-txt" style="font-size:0.65em;color:#f88;min-width:44px">100/100</span>

</div>

<div id="map-panel">
  <div class="map-title">Elegir destino</div>

</div>

<div id="screen-intro" class="screen active">
  <div id="stars-bg"></div>
  <div class="intro-content">
    <svg viewBox="0 0 160 180" width="130" style="margin-bottom:16px" xmlns="http://www.w3.org/2000/svg">

      <path d="M23 43 L79 43 L79 81 L23 81 Z" fill="#8b0000" opacity="0.5"/>

      <text x="51" y="70" text-anchor="middle" font-size="22">&#x1F981;</text>

        <button class="house-btn" data-house="slytherin"  onclick="elegirCasa(this)"><span class="house-icon">&#x1F40D;</span><span>Slytherin</span><span style="font-size:0.7em;opacity:0.6">Astucia</span></button>

        <button class="house-btn" data-house="hufflepuff" onclick="elegirCasa(this)"><span class="house-icon">&#x1F9A1;</span><span>Hufflepuff</span><span style="font-size:0.7em;opacity:0.6">Lealtad</span></button>

<script src="three.min.js"></script>
<script>
var G = {
  player: {
    name:'', house:'', level:1, xp:0, xpNext:100,
    hp:100, hpMax:100, mp:50, mpMax:50,
    spells:['expelliarmus','lumos','wingardium'],
    items:{ pocion:2 },
    completed:[]
  },
  combat:{ active:false, enemy:null, enemyId:'' },
  misionActual: '',
  mode: 'intro'
};

var renderer, camera, clock;
var scenes = {};
var activeScene = null;

function initRenderer() {
  var canvas = document.getElementById('canvas3d');
  renderer = new THREE.WebGLRenderer({ canvas:canvas, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  clock = new THREE.Clock();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 4, 12);
  camera.lookAt(0, 1, 0);
  window.addEventListener('resize', function() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
  });

  // WASD movement
  var keys = {};
  window.addEventListener('keydown', function(e){ keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup',   function(e){ keys[e.key.toLowerCase()] = false; });

  function moverJugador(dt) {
    if (!activeScene || !activeScene.objs || !activeScene.objs.player) return;
    var p = activeScene.objs.player;
    var speed = 4 * dt;
    var moved = false;
    if (keys['w'] || keys['arrowup'])    { p.position.z -= speed; moved = true; }
    if (keys['s'] || keys['arrowdown'])  { p.position.z += speed; moved = true; }
    if (keys['a'] || keys['arrowleft'])  { p.position.x -= speed; moved = true; }
    if (keys['d'] || keys['arrowright']) { p.position.x += speed; moved = true; }
    if (moved) {
      // Rotar personaje hacia la direccion que camina
      var vx = (keys['d']?1:0)-(keys['a']?1:0);
      var vz = (keys['s']?1:0)-(keys['w']?1:0);
      if (vx !== 0 || vz !== 0) p.rotation.y = Math.atan2(vx, vz);
      // Camara sigue al jugador
      var camOffset = new THREE.Vector3(0, 5, 10);
      camera.position.x += (p.position.x + camOffset.x - camera.position.x) * 0.08;
      camera.position.z += (p.position.z + camOffset.z - camera.position.z) * 0.08;
      camera.lookAt(p.position.x, p.position.y + 1.5, p.position.z);
    }
  }

  function loop() {
    requestAnimationFrame(loop);
    var dt = clock.getDelta();
    moverJugador(dt);
    if (activeScene && activeScene.update) activeScene.update(dt);
    if (activeScene) renderer.render(activeScene.scene, camera);
  }
  loop();
}

function mat(color, emissive, rough, metal) {
  return new THREE.MeshStandardMaterial({ color:color, emissive:emissive||0x000000, roughness:rough!==undefined?rough:0.92, metalness:metal!==undefined?metal:0.0 });
}
function matPiel()   { return mat(0xd4a87a, 0x0a0500, 0.88, 0.0); }
function matTela(c)  { return mat(c, 0x000000, 0.95, 0.0); }
function matPiedra() { return mat(0x2e2840, 0x030208, 0.97, 0.0); }
function matMadera() { return mat(0x4a2e10, 0x000000, 0.94, 0.0); }
function matMetal()  { return mat(0x888888, 0x111111, 0.55, 0.7); }
function matOro()    { return mat(0xf0c040, 0x302000, 0.3,  0.9); }
function luz(s, color, intens, x, y, z, shadow) {
  var l = new THREE.PointLight(color, intens, 50);
  l.position.set(x,y,z);
  if (shadow) { l.castShadow=true; }
  s.add(l); return l;
}
function caja(w,h,d,m,x,y,z,s) {
  var mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), m);
  mesh.position.set(x,y,z); mesh.castShadow=true; mesh.receiveShadow=true; s.add(mesh); return mesh;
}
function esfera(r,m,x,y,z,s,seg) {
  var mesh = new THREE.Mesh(new THREE.SphereGeometry(r,seg||12,seg||12), m);
  mesh.position.set(x,y,z); s.add(mesh); return mesh;
}
function cilindro(rt,rb,h,m,x,y,z,s,seg) {
  var mesh = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg||8), m);
  mesh.position.set(x,y,z); mesh.castShadow=true; s.add(mesh); return mesh;
}
function cono(r,h,m,x,y,z,s,seg) {
  var mesh = new THREE.Mesh(new THREE.ConeGeometry(r,h,seg||7), m);
  mesh.position.set(x,y,z); mesh.castShadow=true; s.add(mesh); return mesh;
}
function particulas(s, n, color, spread, yBase) {
  var geo = new THREE.BufferGeometry();
  var pos = new Float32Array(n*3);
  for (var i=0;i<n;i++) {
    pos[i*3]=(Math.random()-0.5)*spread;
    pos[i*3+1]=yBase+Math.random()*6;
    pos[i*3+2]=(Math.random()-0.5)*spread;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  var pts = new THREE.Points(geo, new THREE.PointsMaterial({color:color,size:0.08,transparent:true,opacity:0.85}));
  s.add(pts); return pts;
}

  s.objs.player = mago(s.scene,-3,3,1,0x8b0000,0x0a0a0a,0.9);
  var bp=br.clone();bp.position.set(-3,2.5,1);s.scene.add(bp);
  var snitch=esfera(0.12,new THREE.MeshStandardMaterial({color:0xf0c040,emissive:0xc8a020,emissiveIntensity:2}),0,4,0,s.scene,8);
  s.objs.snitch=snitch; luz(s.scene,0xf0c040,1.5,0,4,0);
  caja(8,1.5,2,mat(0x1a1a3a),-8,0.75,-6,s.scene); caja(8,1.5,2,mat(0x1a1a3a),8,0.75,-6,s.scene);
  [[-5,7,-8],[3,8,-10],[-8,6,-6],[8,7,-9]].forEach(function(d){var c=new THREE.Mesh(new THREE.SphereGeometry(1.5,8,6),new THREE.MeshStandardMaterial({color:0x8888aa,transparent:true,opacity:0.22}));c.position.set(d[0],d[1],d[2]);s.scene.add(c);});
  var dl4=new THREE.DirectionalLight(0xd0e0ff,1.1);dl4.position.set(6,15,8);dl4.castShadow=true;s.scene.add(dl4);
  s.scene.add(new THREE.AmbientLight(0x111130,0.5));
  camera.position.set(0,5,11);camera.lookAt(0,3,-1);
  s.update=function(dt){
    s.t+=dt;
    if(s.objs.snitch){s.objs.snitch.position.x=Math.sin(s.t*1.8)*3;s.objs.snitch.position.y=4+Math.sin(s.t*2.6)*0.8;s.objs.snitch.position.z=Math.cos(s.t*1.4)*2;}
    if(s.objs.enemy){s.objs.enemy.position.y=3+Math.sin(s.t*1.2)*0.4;s.objs.enemy.rotation.y=Math.sin(s.t)*0.2;}
    if(s.objs.player)s.objs.player.position.y=3+Math.sin(s.t*1.5+1)*0.35;
  };
  return s;
}

function setScene(name) {
  if(!scenes[name]) {
    if(name==='map')    scenes[name]=buildMapScene();
    else if(name==='hall')  scenes[name]=buildHallScene();
    else if(name==='alley') scenes[name]=buildAlleyScene();
    else if(name==='forest')scenes[name]=buildForestScene();
    else if(name==='quid')  scenes[name]=buildQuidditchScene();
  }
  activeScene=scenes[name];
}

// =================== UTILIDADES ===================
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function toast(msg) {
  var el=document.createElement('div');el.className='toast';el.innerHTML=msg;
  document.body.appendChild(el);setTimeout(function(){el.remove();},2600);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById('screen-'+id);if(el)el.classList.add('active');
}
function hideScreen(id){var el=document.getElementById('screen-'+id);if(el)el.classList.remove('active');}
function cerrarPaneles(){['bottom-panel','combat-panel','map-panel'].forEach(function(id){document.getElementById(id).classList.remove('open');});}

function actualizarHUD(){
  var p=G.player;
  document.getElementById('hud-name').textContent=p.name+' ('+p.house+')';
  document.getElementById('hud-level').textContent='Nv.'+p.level+' '+p.xp+'/'+p.xpNext+' XP';
  document.getElementById('bar-hp').style.width=Math.max(0,p.hp/p.hpMax*100)+'%';
  document.getElementById('bar-mp').style.width=Math.max(0,p.mp/p.mpMax*100)+'%';
  document.getElementById('txt-hp').textContent=p.hp;
  document.getElementById('txt-mp').textContent=p.mp;
}

function ganarXP(xp){
  G.player.xp+=xp;
  while(G.player.xp>=G.player.xpNext){
    G.player.xp-=G.player.xpNext;G.player.level++;G.player.xpNext=Math.floor(G.player.xpNext*1.5);
    G.player.hpMax+=20;G.player.hp=G.player.hpMax;G.player.mpMax+=10;G.player.mp=G.player.mpMax;
    toast('Nivel '+G.player.level+'! HP y MP aumentados.');
  }
  actualizarHUD();
}

// =================== INTRO ===================
function mostrarCrear(){showScreen('create');}
function elegirCasa(btn){document.querySelectorAll('.house-btn').forEach(function(b){b.classList.remove('selected');});btn.classList.add('selected');G.player.house=btn.dataset.house;}

function empezarJuego(){
  var name=document.getElementById('input-name').value.trim();
  if(!name){toast('Escribe tu nombre');return;}
  if(!G.player.house){toast('Elige tu casa');return;}
  G.player.name=name;guardar();entrarMapa();
}

function continuarJuego(){
  var raw=localStorage.getItem('hp3d_v2');
  if(!raw){toast('Sin partida guardada');return;}
  Object.assign(G.player,JSON.parse(raw));entrarMapa();
}

// =================== MAPA ===================
function entrarMapa(){
  hideScreen('intro');hideScreen('create');
  setScene('map');
  document.getElementById('hud').classList.add('visible');
  actualizarHUD();renderZonas();cerrarPaneles();
}

function renderZonas(){
  var grid=document.getElementById('zones-grid');grid.innerHTML='';
  Object.keys(ZONAS).forEach(function(zid){
    var zinfo=ZONAS[zid];
    var m=MISIONES[zid];
    var hecho=G.player.completed.indexOf(zid)>=0;
    var bloq=m.requiere&&G.player.completed.indexOf(m.requiere)<0;
    var div=document.createElement('div');
    div.className='zone-card '+(hecho?'completed':bloq?'locked':'available');
    div.innerHTML='<span class="zone-icon-big">'+zinfo.icon+'</span><span class="zone-name">'+zinfo.nombre+'</span><span class="zone-status">'+(hecho?'Completada':bloq?'Bloqueada':'Disponible')+'</span>';
    if(!bloq&&!hecho)(function(z){div.onclick=function(){entrarMision(z);};})(zid);
    grid.appendChild(div);
  });
}

function toggleMap(){
  var p=document.getElementById('map-panel');
  if(p.classList.contains('open')){p.classList.remove('open');}
  else{cerrarPaneles();renderZonas();p.classList.add('open');}
}

// =================== MISION ===================
function entrarMision(zid){
  G.misionActual=zid;cerrarPaneles();
  var escMap={hall:'hall',alley:'alley',forest:'forest',quid:'quid'};
  setScene(escMap[MISIONES[zid].escena]||'hall');
  irNodo('start');
}

var typeInt=null;
function irNodo(nodoId){
  if(nodoId==='_mapa'){cerrarPaneles();entrarMapa();return;}
  if(nodoId.indexOf('_combate_')===0){iniciarCombate(nodoId.replace('_combate_',''));return;}
  var nodo=MISIONES[G.misionActual].nodos[nodoId];
  if(!nodo)return;
  document.getElementById('dlg-speaker').textContent=nodo.personaje||'';
  document.getElementById('dlg-choices').innerHTML='';
  if(typeInt)clearInterval(typeInt);
  var el=document.getElementById('dlg-text');el.textContent='';
  var i=0,txt=nodo.texto||'';
  typeInt=setInterval(function(){
    if(i<txt.length){el.textContent+=txt[i++];}
    else{clearInterval(typeInt);renderOpciones(nodo.opciones||[]);}
  },20);
  document.getElementById('bottom-panel').classList.add('open');
}

function renderOpciones(opciones){
  var cont=document.getElementById('dlg-choices');cont.innerHTML='';
  opciones.forEach(function(op){
    var btn=document.createElement('button');btn.className='choice-btn';btn.textContent=op.texto;
    btn.onclick=function(){if(op.reward)mostrarRecompensa(op.reward);else if(op.siguiente)irNodo(op.siguiente);};
    cont.appendChild(btn);
  });
}

// =================== COMBATE ===================
function iniciarCombate(enemyId){
  var eData=ENEMIGOS[enemyId];
  G.combat.enemy=JSON.parse(JSON.stringify(eData));
  G.combat.enemyId=enemyId;G.combat.active=true;
  setScene(eData.escena);
  cerrarPaneles();
  document.getElementById('enemy-name').textContent=eData.name;
  document.getElementById('combat-log').innerHTML='';
  actualizarBarrasCombate();renderHechizos();
  document.getElementById('combat-panel').classList.add('open');
  document.getElementById('turn-ind').style.display='block';
  addLog('Combate! '+eData.name+' aparece!','');
}

function actualizarBarrasCombate(){
  var e=G.combat.enemy,p=G.player;
  document.getElementById('enemy-hp-fill').style.width=Math.max(0,e.hp/e.hpMax*100)+'%';
  document.getElementById('enemy-hp-txt').textContent=Math.max(0,e.hp)+'/'+e.hpMax;
  actualizarHUD();
}

function addLog(msg,cls){
  var log=document.getElementById('combat-log');
  var d=document.createElement('div');d.className=cls;d.textContent=msg;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
}

function renderHechizos(){
  var grid=document.getElementById('spells-grid');grid.innerHTML='';
  G.player.spells.forEach(function(sid){
    var sp=HECHIZOS[sid];
    var btn=document.createElement('button');btn.className='spell-btn';btn.disabled=!G.combat.active||G.player.mp<sp.cost;
    btn.innerHTML='<span class="spell-icon">'+sp.icon+'</span><span class="spell-name">'+sp.name+'</span><span class="spell-stats">MP:'+sp.cost+' DMG:'+sp.dmg[0]+'-'+sp.dmg[1]+'</span>';
    btn.onclick=function(){lanzarHechizo(sid);};grid.appendChild(btn);
  });
  var pot=G.player.items.pocion||0;
  var pb=document.createElement('button');pb.className='spell-btn';pb.disabled=pot===0;
  pb.innerHTML='<span class="spell-icon">&#x2697;</span><span class="spell-name">Pocion</span><span class="spell-stats">'+pot+' | +30 HP</span>';
  pb.onclick=usarPocion;grid.appendChild(pb);
}

function lanzarHechizo(sid){
  if(!G.combat.active)return;
  var sp=HECHIZOS[sid],p=G.player,e=G.combat.enemy;
  if(p.mp<sp.cost){toast('Sin mana');return;}
  renderHechizos();document.getElementById('turn-ind').style.display='none';
  var dmg=rand(sp.dmg[0],sp.dmg[1]);
  p.mp-=sp.cost;e.hp-=dmg;
  addLog(sp.name+': '+dmg+' dano al enemigo','log-magic');
  actualizarBarrasCombate();
  if(e.hp<=0){terminarCombate(true);return;}
  setTimeout(function(){
    if(!G.combat.active)return;
    var edm=rand(e.dmgMin,e.dmgMax);p.hp=Math.max(1,p.hp-edm);
    addLog(e.name+': '+edm+' dano a ti','log-dmg');
    actualizarBarrasCombate();renderHechizos();document.getElementById('turn-ind').style.display='block';
    if(p.hp<=1){p.hp=Math.floor(p.hpMax*0.3);terminarCombate(false);}
  },700);
}

function usarPocion(){
  if(!(G.player.items.pocion>0))return;
  G.player.items.pocion--;var h=30;G.player.hp=Math.min(G.player.hpMax,G.player.hp+h);
  addLog('Pocion: +'+h+' HP','log-heal');actualizarBarrasCombate();renderHechizos();
}

function terminarCombate(gano){
  G.combat.active=false;document.getElementById('turn-ind').style.display='none';
  var eid=G.combat.enemyId;
  setTimeout(function(){
    document.getElementById('combat-panel').classList.remove('open');
    var m=MISIONES[G.misionActual];
    var escMap={hall:'hall',alley:'alley',forest:'forest',quid:'quid'};
    setScene(escMap[m.escena]||'hall');
    if(gano){addLog('Victoria!','log-win');irNodo('win_'+eid);}
    else{irNodo('lose_'+eid);}
  },1200);
}

// =================== RECOMPENSA ===================
function mostrarRecompensa(reward){
  G.player.completed.push(G.misionActual);
  ganarXP(reward.xp||0);
  if(reward.items)Object.keys(reward.items).forEach(function(k){G.player.items[k]=(G.player.items[k]||0)+reward.items[k];});
  if(reward.hechizo&&G.player.spells.indexOf(reward.hechizo)<0){
    G.player.spells.push(reward.hechizo);
    toast('Nuevo hechizo: '+HECHIZOS[reward.hechizo].name+'!');
  }
  document.getElementById('rew-icon').innerHTML=reward.icon||'&#x1F3C6;';
  document.getElementById('rew-msg').textContent=reward.msg||'';
  var items=document.getElementById('rew-items');
  items.innerHTML='<div class="reward-item">Experiencia <span class="reward-val">+'+reward.xp+' XP</span></div>';
  if(reward.items)Object.keys(reward.items).forEach(function(k){items.innerHTML+='<div class="reward-item">Pocion <span class="reward-val">+'+reward.items[k]+'</span></div>';});
  if(reward.hechizo){var sp=HECHIZOS[reward.hechizo];items.innerHTML+='<div class="reward-item">'+sp.name+' <span class="reward-val">NUEVO</span></div>';}
  guardar();cerrarPaneles();showScreen('reward');
}

function despuesRecompensa(){hideScreen('reward');entrarMapa();}

// =================== GUARDADO ===================
function guardar(){localStorage.setItem('hp3d_v2',JSON.stringify(G.player));}

// =================== INIT ===================
function init(){
  var bg=document.getElementById('stars-bg');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');s.className='star';
    var sz=Math.random()*2.5+0.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+Math.random()*2+'s;animation-duration:'+(1.5+Math.random()*2)+'s';
    bg.appendChild(s);
  }
  if(localStorage.getItem('hp3d_v2'))document.getElementById('btn-continuar').style.display='block';
  initRenderer();
  setScene('map');
}

init();
